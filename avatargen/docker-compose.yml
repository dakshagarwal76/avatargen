version: "3.9"

services:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      # Mount Wav2Lip if cloned at project root
      - ../Wav2Lip:/Wav2Lip:ro
    environment:
      - WAV2LIP_DIR=/Wav2Lip
      - WAV2LIP_CHECKPOINT=/Wav2Lip/checkpoints/wav2lip_gan.pth
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  storage:
